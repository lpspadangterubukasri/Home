<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a5f7a;
            --secondary: #159895;
            --accent: #57c5b6;
            --light: #f5f9fa;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 24px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 i {

        /* ===== TABS ===== */
        .tabs {
            display: flex;

            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .tabs .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            color: #718096;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tabs .tab-btn.active {

            color: white;
        }
        
        .tabs .tab-btn:hover {
            transform: translateY(-2px);
        }
        
        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeIn 0.3s ease;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }
        
        .product-card .product-image {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            background: #e2e8f0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-card .product-image i {
            font-size: 48px;
            color: #a0aec0;
        }
        
        .product-card .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .product-card .product-desc {
            font-size: 13px;
            color: #718096;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-card .product-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        .product-card .product-price span {
            font-size: 12px;

            color: #a0aec0;
        }
        
        .product-card .product-stock {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 12px;
        }
        
        .product-card .btn-tukar {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            font-size: 14px;
        }
        
        .product-card .btn-tukar:hover {

        }

        /* ===== MODAL ===== */
        .modal-overlay {

            left: 0;

        .modal-box {

        @keyframes popIn {

            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

        .modal-box .modal-detail .row .value.negative {

        .modal-box .modal-actions {

            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            font-size: 14px;
        }
        
        .modal-box .modal-actions .btn-modal.cancel {
            background: #e2e8f0;
            color: #2d3748;
        }
        
        .modal-box .modal-actions .btn-modal.cancel:hover {
            background: #cbd5e0;
        }
        
        .modal-box .modal-actions .btn-modal.confirm {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }
        
        .modal-box .modal-actions .btn-modal.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(21, 152, 149, 0.3);
        }
        
        .modal-box .modal-actions .btn-modal.confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ===== SUCCESS POPUP ===== */
        .success-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .success-popup-overlay.active {

        }
        
        .success-popup {

            border-radius: 24px;

            text-align: center;

        .success-popup .icon {

            margin-bottom: 15px;
        }
        
        .success-popup h3 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .success-popup p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .success-popup .btn-ok {
            margin-top: 20px;
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        
        .success-popup .btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(21, 152, 149, 0.3);
        }
        
        /* ===== ALERT ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            font-weight: 500;
        }
        
        .alert.show {
            display: block;
        }
        .alert-success {
            background: #e6f7e6;
            color: #1a7a3a;
            border: 1px solid #b8e6b8;
        }
        .alert-error {
            background: #fde8e8;
            color: #b33c3c;
            border: 1px solid #f5c6c6;
        }
        .alert-info {
            background: #e3f2fd;
            color: #1a5f7a;
            border: 1px solid #b8d4e6;
        }
        
        /* ===== LOADING SKELETON ===== */
        .skeleton {
            background: #e2e8f0;
            border-radius: 8px;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .header {
                padding: 18px 20px;
                flex-direction: column;
                text-align: center;
            }
            
            .header h1 {
                font-size: 18px;
                justify-content: center;
            }
            
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 15px;
            }
            
            .tabs .tab-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            
            .modal-box {
                padding: 24px 20px;
                margin: 12px;
            }
        }
        
        @media (max-width: 400px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tabs .tab-btn {
                justify-content: center;
            }
        }
    </style>
</head>

    <script>
        // ==================== KONFIGURASI ====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbzottltgkebNPFrqwmOFKLJtw1rHo6ZaYM9aI4sLMxjqjxvCft9eTthghw1yNGIsGo/exec';
        
        // ==================== DATA PRODUK ====================
        // Data produk bisa diambil dari spreadsheet atau static
        const PRODUCTS = [
            {

            },
            {

            },
            {
                id: 6,

                desc: 'Totebag kanvas ramah lingkungan dengan logo LPS Padang Terubuk Asri',
                price: 1500,
                category: 'merchandise',
                stock: 40,
                image: '🛍️',
                badge: ''
            },
            {
                id: 7,
                name: 'Donasi Pendidikan',
                desc: 'Donasi untuk program pendidikan lingkungan di Padang Terubuk Asri',
                price: 500,
                category: 'donasi',
                stock: 999,

                badge: ''
            },
            {
                id: 8,
                name: 'Donasi Penghijauan',
                desc: 'Donasi untuk program penghijauan dan penanaman pohon di lingkungan',
                price: 300,
                category: 'donasi',
                stock: 999,
                image: '🌳',
                badge: ''
            },
            {
                id: 9,
                name: 'Donasi Bank Sampah',
                desc: 'Donasi untuk pengembangan bank sampah dan edukasi pemilahan',
                price: 200,
                category: 'donasi',
                stock: 999,
                image: '♻️',
                badge: ''
            },
            {
                id: 10,
                name: 'Stiker Edukasi Sampah',
                desc: 'Paket stiker edukasi tentang pemilahan sampah untuk anak-anak',
                price: 100,
                category: 'lainnya',
                stock: 100,
                image: '📝',
                badge: 'baru'
            }
        ];
        
        // ==================== STATE ====================
        let currentCategory = 'all';
        let selectedProduct = null;
        let userNik = '';
        let userData = null;
        let userPoin = 0;
        
        // ==================== HELPER ====================
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        function showAlert(message, type) {
            var alert = document.getElementById('alert');
            alert.className = 'alert alert-' + type + ' show';
            alert.textContent = message;
            setTimeout(function() {
                alert.className = 'alert';
            }, 5000);
        }
        
        function hideAlert() {
            document.getElementById('alert').className = 'alert';
        }
        
        // ==================== API CALL ====================
        function callAPI(action, data) {
            return new Promise(function(resolve, reject) {
                var callbackName = 'jsonp_callback_' + Date.now();
                var params = new URLSearchParams({ action: action, callback: callbackName });
                for (var key in data) {
                    if (data.hasOwnProperty(key)) params.append(key, data[key]);
                }
                var url = API_URL + '?' + params.toString();
                
                var script = document.createElement('script');
                script.src = url;
                script.async = true;
                
                var timeout = setTimeout(function() {
                    cleanup();
                    reject(new Error('⏱️ Request timeout (15 detik)'));
                }, 15000);
                
                function cleanup() {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                }
                
                window[callbackName] = function(response) {
                    cleanup();
                    resolve(response);
                };
                
                script.onerror = function() {
                    cleanup();
                    reject(new Error('❌ Gagal terhubung ke server.'));
                };
                
                document.head.appendChild(script);
            });
        }
        
        // ==================== LOAD USER DATA ====================
        function loadUserData() {
            var session = sessionStorage.getItem('lps_session');
            if (!session) {
                var localUser = localStorage.getItem('lps_user');
                if (localUser) {
                    try {
                        userData = JSON.parse(localUser);
                        userNik = userData.nik || '';
                        loadUserPoin();
                        return;
                    } catch(e) {}
                }
                showAlert('Sesi tidak ditemukan, silahkan login kembali', 'error');
                return;
            }
            
            try {
                var sessionData = JSON.parse(session);
                userData = sessionData;
                userNik = userData.nik || '';
                loadUserPoin();
            } catch (e) {
                showAlert('Error loading session data', 'error');
            }
        }
        
        function loadUserPoin() {
            if (!userNik) {
                showAlert('NIK tidak ditemukan', 'error');
                return;
            }
            
            callAPI('getUserDataWithRole', { nik: userNik })
                .then(function(result) {
                    if (result.success && result.found) {
                        var data = result.data;
                        userPoin = Number(data.point_hadiah) || 0;
                        renderProducts();
                    } else {
                        showAlert('Gagal memuat data user: ' + (result.message || ''), 'error');
                    }
                })
                .catch(function(error) {
                    showAlert('Error: ' + error.message, 'error');
                });
        }
        
        // ==================== RENDER PRODUCTS ====================
        function renderProducts() {
            var grid = document.getElementById('productGrid');
            
            var filtered = PRODUCTS;
            if (currentCategory !== 'all') {
                filtered = PRODUCTS.filter(function(p) {
                    return p.category === currentCategory;
                });
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>Belum Ada Produk</h3>
                        <p>Belum ada produk di kategori ini. Silahkan cek kategori lain.</p>
                    </div>
                `;
                return;
            }
            
            var html = '';
            filtered.forEach(function(product) {
                var isOutOfStock = product.stock <= 0;
                var canBuy = userPoin >= product.price && !isOutOfStock;
                var badgeHtml = product.badge ? `<span class="badge ${product.badge}">${product.badge.toUpperCase()}</span>` : '';
                
                html += `
                    <div class="product-card">
                        ${badgeHtml}
                        <div class="product-image">
                            <i class="fas fa-2x">${product.image}</i>
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.desc}</div>
                        <div class="product-price">${formatNumber(product.price)} <span>poin</span></div>
                        <div class="product-stock">${isOutOfStock ? 'Stok Habis' : 'Stok: ' + product.stock}</div>
                        <button class="btn-tukar ${isOutOfStock ? 'out-of-stock' : ''}" 
                                onclick="openConfirmModal(${product.id})"
                                ${!canBuy ? 'disabled' : ''}>
                            ${isOutOfStock ? 'Stok Habis' : canBuy ? 'Tukar Sekarang' : 'Poin Tidak Cukup'}
                        </button>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }
        
        // ==================== FILTER PRODUCTS ====================
        function filterProducts(category) {
            currentCategory = category;
            
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });
            
            renderProducts();
        }
        
        // ==================== CONFIRM MODAL ====================
        function openConfirmModal(productId) {
            var product = PRODUCTS.find(function(p) { return p.id === productId; });
            if (!product) return;
            
            if (product.stock <= 0) {
                showAlert('Maaf, stok produk ini habis!', 'error');
                return;
            }
            
            if (userPoin < product.price) {
                showAlert('Poin Anda tidak cukup!', 'error');
                return;
            }
            
            selectedProduct = product;
            
            document.getElementById('confirmProduct').textContent = product.name;
            document.getElementById('confirmPrice').textContent = formatNumber(product.price) + ' poin';
            document.getElementById('confirmSisa').textContent = formatNumber(userPoin - product.price) + ' poin';
            
            document.getElementById('confirmModal').classList.add('active');
        }
        
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            selectedProduct = null;
        }
        
        function confirmTukar() {
            if (!selectedProduct) return;
            
            var btn = document.getElementById('confirmBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            btn.disabled = true;
            
            // Proses tukar poin - panggil API tukarPoint
            callAPI('tukarPoint', {
                nik: userNik,
                username: userData.username || '',
                productId: selectedProduct.id,
                productName: selectedProduct.name,
                price: selectedProduct.price
            })
            .then(function(result) {
                if (result.success) {
                    // Kurangi stok produk (untuk demo)
                    var product = PRODUCTS.find(function(p) { return p.id === selectedProduct.id; });
                    if (product) {
                        product.stock = Math.max(0, product.stock - 1);
                    }
                    
                    // Update poin user
                    userPoin = userPoin - selectedProduct.price;
                    
                    closeConfirmModal();
                    showSuccessPopup('Berhasil menukarkan poin untuk <strong>' + selectedProduct.name + '</strong>!');
                    renderProducts();
                } else {
                    showAlert('Gagal menukarkan poin: ' + (result.message || ''), 'error');
                }
            })
            .catch(function(error) {
                showAlert('Error: ' + error.message, 'error');
            })
            .finally(function() {
                btn.innerHTML = '<i class="fas fa-check"></i> Tukar Sekarang';
                btn.disabled = false;
            });
        }
        
        // ==================== SUCCESS POPUP ====================
        function showSuccessPopup(message) {
            document.getElementById('successMessage').innerHTML = message;
            document.getElementById('successPopup').classList.add('active');
        }
        
        function closeSuccessPopup() {
            document.getElementById('successPopup').classList.remove('active');
        }
        
        // ==================== INIT ====================
        (function() {
            loadUserData();
            
            // Refresh poin setiap 30 detik
            setInterval(function() {
                loadUserPoin();
            }, 30000);
        })();
    </script>
</body>
</html>
