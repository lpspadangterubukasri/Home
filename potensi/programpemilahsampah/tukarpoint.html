<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Tukar Point - LPS Padang Terubuk Asri">
    <title>Tukar Point - LPS Padang Terubuk Asri</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;   
        }
        
        :root {
            --primary: #1a5f7a;   
            --secondary: #159895;  
            --accent: #57c5b6;
            --light: #f5f9fa;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
            
            --role-pemula: #22c55e;
            --role-veteran: #f97316;
            --role-master: #3b82f6;
            --role-grandmaster: #f59e0b;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 i {
            font-size: 28px;
        }
        
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .header .user-info .name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .header .user-info .role-badge {
            font-size: 11px;
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .header .user-info .role-badge.pemula {
            background: rgba(34, 197, 94, 0.3);
            color: var(--role-pemula);
        }
        .header .user-info .role-badge.veteran {
            background: rgba(249, 115, 22, 0.3);
            color: var(--role-veteran);
            animation: glowOrange 2s ease-in-out infinite;
        }
        .header .user-info .role-badge.master {
            background: rgba(59, 130, 246, 0.3);
            color: var(--role-master);
            animation: glowBlue 2s ease-in-out infinite;
        }
        .header .user-info .role-badge.grandmaster {
            background: rgba(245, 158, 11, 0.3);
            color: var(--role-grandmaster);
            animation: glowGold 1.5s ease-in-out infinite;
        }
        .header .user-info .role-badge.admin {
            background: rgba(30, 64, 175, 0.3);
            color: #1e40af;
            animation: glowDarkBlue 2s ease-in-out infinite;
        }
        .header .user-info .role-badge.pendiri {
            background: rgba(212, 175, 55, 0.3);
            color: #d4af37;
            animation: glowGold 1.5s ease-in-out infinite;
        }
        
        .header .user-info .poin-sampah {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .header .user-info .poin-sampah i {
            color: #f59e0b;
        }
        
        @keyframes glowOrange {
            0%, 100% { box-shadow: 0 0 5px rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.6); }
        }
        @keyframes glowBlue {
            0%, 100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        }
        @keyframes glowGold {
            0%, 100% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.3); }
            50% { box-shadow: 0 0 25px rgba(245, 158, 11, 0.8); }
        }
        @keyframes glowDarkBlue {
            0%, 100% { box-shadow: 0 0 5px rgba(30, 64, 175, 0.3); }
            50% { box-shadow: 0 0 20px rgba(30, 64, 175, 0.6); }
        }
        
        /* ===== TABS KATEGORI ===== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .tabs .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            color: #718096;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tabs .tab-btn.active {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }
        
        .tabs .tab-btn:hover {
            transform: translateY(-2px);
        }
        
        .tabs .tab-btn .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .tabs .tab-btn .dot.pemula { background: var(--role-pemula); }
        .tabs .tab-btn .dot.veteran { background: var(--role-veteran); }
        .tabs .tab-btn .dot.master { background: var(--role-master); }
        .tabs .tab-btn .dot.grandmaster { background: var(--role-grandmaster); }
        
        /* ===== SECTION TOKO ===== */
        .shop-section {
            margin-bottom: 30px;
        }
        
        .shop-section .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(26, 95, 122, 0.1);
        }
        
        .shop-section .section-title .badge-role {
            font-size: 12px;
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .shop-section .section-title .badge-role.pemula {
            background: rgba(34, 197, 94, 0.15);
            color: var(--role-pemula);
        }
        .shop-section .section-title .badge-role.veteran {
            background: rgba(249, 115, 22, 0.15);
            color: var(--role-veteran);
        }
        .shop-section .section-title .badge-role.master {
            background: rgba(59, 130, 246, 0.15);
            color: var(--role-master);
        }
        .shop-section .section-title .badge-role.grandmaster {
            background: rgba(245, 158, 11, 0.15);
            color: var(--role-grandmaster);
        }
        
        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: fadeIn 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }
        
        .product-card .product-image {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            background: #e2e8f0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-image .placeholder {
            font-size: 48px;
            color: #a0aec0;
        }
        
        .product-card .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .product-card .product-level {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .product-card .product-level .level-badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        
        .product-card .product-level .level-badge.pemula {
            background: rgba(34, 197, 94, 0.15);
            color: var(--role-pemula);
        }
        .product-card .product-level .level-badge.veteran {
            background: rgba(249, 115, 22, 0.15);
            color: var(--role-veteran);
        }
        .product-card .product-level .level-badge.master {
            background: rgba(59, 130, 246, 0.15);
            color: var(--role-master);
        }
        .product-card .product-level .level-badge.grandmaster {
            background: rgba(245, 158, 11, 0.15);
            color: var(--role-grandmaster);
        }
        
        .product-card .product-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 4px;
        }
        
        .product-card .product-price span {
            font-size: 12px;
            font-weight: 400;
            color: #a0aec0;
        }
        
        .product-card .product-stock {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 12px;
        }
        
        .product-card .btn-tukar {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            margin-top: auto;
        }
        
        .product-card .btn-tukar.beli {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }
        
        .product-card .btn-tukar.beli:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(21, 152, 149, 0.3);
        }
        
        .product-card .btn-tukar.terkunci {
            background: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
        }
        
        .product-card .btn-tukar.poin-tidak-cukup {
            background: #fee2e2;
            color: #dc2626;
            cursor: not-allowed;
        }
        
        .product-card .btn-tukar.stok-habis {
            background: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
        }
        
        .product-card .badge-locked {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #fee2e2;
            color: #dc2626;
        }
        
        .product-card .badge-stok-habis {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #e2e8f0;
            color: #718096;
        }
        
        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        
        .empty-state i {
            font-size: 64px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .empty-state p {
            font-size: 14px;
        }
        
        /* ===== MODAL KONFIRMASI ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-box {
            background: white;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            padding: 30px 35px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin: 20px;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-box .modal-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .modal-box h3 {
            font-size: 20px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }
        
        .modal-box .modal-sub {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .modal-box .modal-detail {
            background: #f7fafc;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .modal-box .modal-detail .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
        }
        
        .modal-box .modal-detail .row .label {
            color: #718096;
        }
        
        .modal-box .modal-detail .row .value {
            font-weight: 600;
            color: #2d3748;
        }
        
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
        }
        
        .modal-box .modal-actions .btn-modal {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            font-size: 14px;
        }
        
        .modal-box .modal-actions .btn-modal.cancel {
            background: #e2e8f0;
            color: #2d3748;
        }
        
        .modal-box .modal-actions .btn-modal.cancel:hover {
            background: #cbd5e0;
        }
        
        .modal-box .modal-actions .btn-modal.confirm {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }
        
        .modal-box .modal-actions .btn-modal.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(21, 152, 149, 0.3);
        }
        
        .modal-box .modal-actions .btn-modal.confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ===== STRUK POPUP ===== */
        .struk-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .struk-popup-overlay.active {
            display: flex;
        }
        
        .struk-popup {
            background: white;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            padding: 30px 25px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .struk-popup .struk-header {
            text-align: center;
            border-bottom: 2px dashed #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        .struk-popup .struk-header .logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }
        
        .struk-popup .struk-header .sub {
            font-size: 11px;
            color: #a0aec0;
        }
        
        .struk-popup .struk-body .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        
        .struk-popup .struk-body .row .label {
            color: #718096;
        }
        
        .struk-popup .struk-body .row .value {
            font-weight: 600;
            color: #2d3748;
        }
        
        .struk-popup .struk-body .divider {
            border-top: 1px dashed #e2e8f0;
            margin: 10px 0;
        }
        
        .struk-popup .struk-body .total {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary);
            text-align: center;
            padding: 10px 0;
        }
        
        .struk-popup .struk-footer {
            border-top: 2px dashed #e2e8f0;
            padding-top: 15px;
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
        }
        
        .struk-popup .btn-download-struk {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .struk-popup .btn-download-struk:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(21, 152, 149, 0.3);
        }
        
        .struk-popup .btn-close-struk {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            background: #e2e8f0;
            color: #2d3748;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .struk-popup .btn-close-struk:hover {
            background: #cbd5e0;
        }
        
        /* ===== SUCCESS POPUP ===== */
        .success-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .success-popup-overlay.active {
            display: flex;
        }
        
        .success-popup {
            background: white;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            padding: 40px 35px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin: 20px;
        }
        
        .success-popup .icon {
            font-size: 72px;
            margin-bottom: 15px;
        }
        
        .success-popup h3 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .success-popup p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .success-popup .btn-ok {
            margin-top: 20px;
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        
        .success-popup .btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(21, 152, 149, 0.3);
        }
        
        /* ===== ALERT ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
            font-weight: 500;
        }
        
        .alert.show {
            display: block;
        }
        .alert-success {
            background: #e6f7e6;
            color: #1a7a3a;
            border: 1px solid #b8e6b8;
        }
        .alert-error {
            background: #fde8e8;
            color: #b33c3c;
            border: 1px solid #f5c6c6;
        }
        .alert-info {
            background: #e3f2fd;
            color: #1a5f7a;
            border: 1px solid #b8d4e6;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .header {
                padding: 16px 18px;
                flex-direction: column;
                text-align: center;
            }
            
            .header h1 {
                font-size: 18px;
                justify-content: center;
            }
            
            .header .user-info {
                justify-content: center;
                width: 100%;
            }
            
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 15px;
            }
            
            .tabs .tab-btn {
                padding: 8px 14px;
                font-size: 12px;
            }
            
            .modal-box {
                padding: 24px 20px;
                margin: 12px;
            }
            
            .struk-popup {
                padding: 20px 15px;
                margin: 10px;
            }
        }
        
        @media (max-width: 400px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tabs .tab-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>
                <i class="fas fa-gift"></i>
                Toko LPS
            </h1>
            <div class="user-info" id="userInfo">
                <span class="name" id="userName">Loading...</span>
                <span class="role-badge" id="userRoleBadge">Pemula</span>
                <span class="poin-sampah">
                    <i class="fas fa-coins"></i>
                    <span id="userPoinDisplay">0</span>
                </span>
            </div>

// ==================== HELPER ====================
function formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function showAlert(message, type) {
    var alert = document.getElementById('alert');
    alert.className = 'alert alert-' + type + ' show';
    alert.textContent = message;
    setTimeout(function() {
        alert.className = 'alert';
    }, 5000);
}

function hideAlert() {
    document.getElementById('alert').className = 'alert';
}

function getRoleClass(role) {

function getRoleLabel(role) {
    return role || 'Pemula';
}

// ==================== API CALL ====================
function callAPI(action, data) {
    return new Promise(function(resolve, reject) {
        var callbackName = 'jsonp_callback_' + Date.now();
        var params = new URLSearchParams({ action: action, callback: callbackName });
        for (var key in data) {
            if (data.hasOwnProperty(key)) params.append(key, data[key]);
        }
        var url = API_URL + '?' + params.toString();
        
        console.log('📡 Call API:', url);
        
        var script = document.createElement('script');
        script.src = url;
        script.async = true;
        
        var timeout = setTimeout(function() {
            cleanup();
            reject(new Error('⏱️ Request timeout (15 detik)'));
        }, 15000);
        
        function cleanup() {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
        }
        
        window[callbackName] = function(response) {
            console.log('📡 Response:', response);
            cleanup();
            resolve(response);
        };
        
        script.onerror = function() {
            cleanup();
            reject(new Error('❌ Gagal terhubung ke server.'));
        };
        
        document.head.appendChild(script);
    });
}

        userData = sessionData;
        userNik = userData.nik || '';

// ==================== RENDER PRODUCTS (DENGAN FILTER NULL) ====================
function renderProducts() {
    var container = document.getElementById('productContainer');

    console.log('🎨 allProducts length:', allProducts ? allProducts.length : 0);

            </div>

        return;
    }
    
    // ===== FILTER DATA NULL =====
    var validProducts = allProducts.filter(function(p) {
        return p && typeof p === 'object' && p.nama_barang && p.nama_barang.trim() !== '';
    });
    
    console.log('📦 Total products:', allProducts.length);
    console.log('📦 Valid products:', validProducts.length);
    
    if (validProducts.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <h3>Belum Ada Produk</h3>
                <p>Silahkan tambahkan produk di spreadsheet DAFTAR_BARANG</p>
            </div>
        `;
        return;
    }
    
    // ===== FILTER BERDASARKAN KATEGORI =====
    var filtered = validProducts;
    if (currentCategory !== 'all') {
        filtered = validProducts.filter(function(p) {
            return p.level_akses === currentCategory;
        });
    }
    
    console.log('📊 Filtered:', filtered.length, 'items');
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <h3>Belum Ada Produk</h3>
                <p>Belum ada produk di kategori ini. Silahkan cek kategori lain.</p>
            </div>
        `;
        return;
    }
    
    var userLevel = ROLE_HIERARCHY[userRole] || 1;
    var html = '';
    
    // Header info
    html += '<div style="padding:10px 15px;margin-bottom:15px;background:#e3f2fd;border-radius:8px;text-align:center;font-size:14px;color:#1a5f7a;">';

    html += ' | 🪙 ' + formatNumber(userPoin) + ' poin';
    html += '</div>';
    
    // Grid
    html += '<div class="product-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;">';
    
    filtered.forEach(function(product, index) {
        // Validasi lagi
        if (!product || !product.nama_barang) {
            console.warn('⚠️ Skip invalid product at index', index);
            return;
        }
        
        console.log('✅ Render product ' + (index+1) + ':', product.nama_barang);
        
        // Status
        var isLocked = userLevel < ROLE_HIERARCHY[product.level_akses];
        var isOutOfStock = product.stok <= 0;
        var isPoinCukup = userPoin >= product.harga_barang;
        
        // Tombol
        var btnText = '🛒 Beli';
        var btnDisabled = false;
        var btnColor = 'background:linear-gradient(135deg,#159895,#1a5f7a);color:white;cursor:pointer;';
        var btnClick = 'onclick="openConfirmModal(\'' + product.nama_barang.replace(/'/g, "\\'") + '\')"';
        
        if (isOutOfStock) {
            btnText = 'Stok Habis';
            btnDisabled = true;
            btnColor = 'background:#e2e8f0;color:#a0aec0;cursor:not-allowed;';
            btnClick = '';
        } else if (isLocked) {
            btnText = '🔒 Terkunci';
            btnDisabled = true;
            btnColor = 'background:#e2e8f0;color:#a0aec0;cursor:not-allowed;';
            btnClick = '';
        } else if (!isPoinCukup) {
            btnText = 'Poin Tidak Cukup';
            btnDisabled = true;
            btnColor = 'background:#fee2e2;color:#dc2626;cursor:not-allowed;';
            btnClick = '';
        }
        
        // Level color
        var levelColor = '#22c55e';
        if (product.level_akses === 'Veteran') levelColor = '#f97316';
        else if (product.level_akses === 'Master') levelColor = '#3b82f6';
        else if (product.level_akses === 'Grand Master') levelColor = '#f59e0b';
        
        // Foto
        var fotoHtml = (product.url_foto && product.url_foto.trim() !== '') 
            ? '<img src="' + product.url_foto + '" alt="' + product.nama_barang + '" style="width:100%;height:100%;object-fit:cover;">' 
            : '<span style="font-size:48px;color:#a0aec0;"><i class="fas fa-box"></i></span>';
        
        // Badge
        var badgeHtml = '';
        if (isOutOfStock) {
            badgeHtml = '<span style="position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#e2e8f0;color:#718096;">Stok Habis</span>';
        } else if (isLocked) {
            badgeHtml = '<span style="position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fee2e2;color:#dc2626;">🔒 Terkunci</span>';
        }
        
        // Card
        html += '<div class="product-card" style="background:white;border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);transition:all 0.3s ease;position:relative;display:flex;flex-direction:column;border:1px solid #f0f0f0;">';
        html += badgeHtml;
        html += '<div style="width:100%;height:180px;border-radius:12px;background:#f7fafc;margin-bottom:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #e2e8f0;">' + fotoHtml + '</div>';
        html += '<div style="font-size:16px;font-weight:600;color:#1a5f7a;margin-bottom:4px;">' + product.nama_barang + '</div>';
        html += '<div style="font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;">';
        html += '  <i class="fas fa-shield-alt"></i> Level: ';
        html += '  <span style="padding:2px 12px;border-radius:20px;font-size:11px;background:' + levelColor + '20;color:' + levelColor + ';font-weight:600;">' + product.level_akses + '</span>';
        html += '</div>';
        html += '<div style="font-size:20px;font-weight:700;color:#159895;margin-bottom:4px;">' + formatNumber(product.harga_barang) + ' <span style="font-size:12px;font-weight:400;color:#a0aec0;">poin</span></div>';
        html += '<div style="font-size:12px;color:#a0aec0;margin-bottom:12px;">📦 Stok: ' + product.stok + '</div>';
        html += '<button ' + btnClick + ' ' + (btnDisabled ? 'disabled' : '') + ' style="width:100%;padding:10px;border:none;border-radius:10px;font-weight:600;font-family:Poppins,sans-serif;transition:all 0.3s ease;font-size:14px;margin-top:auto;' + btnColor + '">' + btnText + '</button>';
        html += '</div>';
    });
    
    html += '</div>';
    
    container.innerHTML = html;
    console.log('✅ Render complete, total cards:', filtered.length);
}

// ==================== FILTER PRODUCTS ====================
function filterProducts(category) {
    console.log('🔍 Filter:', category);
    currentCategory = category;
    
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.remove('active');
        if (btn.dataset.category === category) {
            btn.classList.add('active');
        }
    });
    
    // Pastikan allProducts sudah ada sebelum render
    if (allProducts && allProducts.length > 0) {
        renderProducts();
    } else {
        loadProducts();
    }
}

// ==================== CONFIRM MODAL ====================
function openConfirmModal(productName) {
    console.log('🔍 Cari produk:', productName);
    console.log('📦 allProducts:', allProducts);
    
    if (!allProducts || allProducts.length === 0) {
        showAlert('Data produk belum dimuat, coba refresh halaman', 'error');
        return;
    }
    
    var product = allProducts.find(function(p) { 
        return p.nama_barang === productName; 
    });
    
    if (!product) {
        console.error('❌ Produk tidak ditemukan:', productName);
        showAlert('Produk tidak ditemukan: ' + productName, 'error');
        return;
    }
    
    console.log('✅ Produk ditemukan:', product);
    
    if (product.stok <= 0) {
        showAlert('Maaf, stok produk ini habis!', 'error');
        return;
    }
    
    if (ROLE_HIERARCHY[userRole] < ROLE_HIERARCHY[product.level_akses]) {
        showAlert('Level Anda tidak cukup! Dibutuhkan: ' + product.level_akses, 'error');
        return;
    }
    
    if (userPoin < product.harga_barang) {
        showAlert('Poin Anda tidak cukup!', 'error');
        return;
    }
    
    selectedProduct = product;
    
    document.getElementById('confirmProduct').textContent = product.nama_barang;
    document.getElementById('confirmLevel').textContent = getRoleLabel(product.level_akses);
    document.getElementById('confirmPrice').textContent = formatNumber(product.harga_barang) + ' poin';
    document.getElementById('confirmSisa').textContent = formatNumber(userPoin - product.harga_barang) + ' poin';
    
    document.getElementById('confirmModal').classList.add('active');
}

function closeConfirmModal() {
    document.getElementById('confirmModal').classList.remove('active');
    selectedProduct = null;
}

// ==================== CONFIRM BELI + STRUK ====================
function confirmBeli() {
    if (!selectedProduct) return;
    
    var btn = document.getElementById('confirmBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
    btn.disabled = true;
    
    callAPI('beliBarang', {
        nik: userNik,
        username: userData.username || '',
        nama_barang: selectedProduct.nama_barang,
        harga: selectedProduct.harga_barang,
        level_akses: selectedProduct.level_akses
    })
    .then(function(result) {
        if (result.success) {
            // Update poin user
            userPoin = result.sisa_poin || (userPoin - selectedProduct.harga_barang);
            document.getElementById('userPoinDisplay').textContent = formatNumber(userPoin);
            
            // Update stok
            var product = allProducts.find(function(p) { return p.nama_barang === selectedProduct.nama_barang; });
            if (product) {
                product.stok = result.sisa_stok || (product.stok - 1);
            }
            
            closeConfirmModal();
            
            // ===== GENERATE STRUK =====
            callAPI('generateStruk', {
                nik: userNik,
                username: userData.username || '',
                nama_barang: selectedProduct.nama_barang,
                harga: selectedProduct.harga_barang,
                level_akses: selectedProduct.level_akses
            })
            .then(function(strukResult) {
                if (strukResult.success) {
                    showStruk(strukResult.data);
                    renderProducts();
                } else {
                    showAlert('Pembelian berhasil, tapi gagal generate struk: ' + (strukResult.message || ''), 'error');
                    renderProducts();
                }
            })
            .catch(function(error) {
                showAlert('Pembelian berhasil, tapi gagal generate struk: ' + error.message, 'error');
                renderProducts();
            });
            
        } else {
            showAlert('Gagal membeli: ' + (result.message || ''), 'error');
            btn.innerHTML = '<i class="fas fa-check"></i> Beli Sekarang';
            btn.disabled = false;
        }
    })
    .catch(function(error) {
        showAlert('Error: ' + error.message, 'error');
        btn.innerHTML = '<i class="fas fa-check"></i> Beli Sekarang';
        btn.disabled = false;
    });
}

function downloadStruk() {
    var content = document.getElementById('strukContent');
    var strukHTML = content.innerHTML;
    
    var downloadHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Struk Pembelian LPS</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }

                .header h2 { font-size: 18px; }
                .header p { font-size: 12px; color: #666; }
                .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
                .divider { border-top: 1px dashed #ccc; margin: 8px 0; }
                .total { text-align: center; font-size: 20px; font-weight: 700; padding: 10px 0; }
                .footer { text-align: center; border-top: 2px dashed #333; padding-top: 10px; margin-top: 10px; font-size: 11px; color: #666; }

                @media print { .print-btn { display: none; } }
            </style>
        </head>
        <body>
            <div class="struk">
                ${strukHTML}
            </div>
            <button class="print-btn" onclick="window.print()">🖨️ Print / Simpan PDF</button>
            <script>
                setTimeout(function() {
                    window.print();
                }, 500);
            <\/script>
        </body>
        </html>
    `;
    
    var blob = new Blob([downloadHTML], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'struk_pembelian_LPS.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
