        // ============================================================
        // FUNGSI UTILITY
        // ============================================================
        function getCategoryInfo(informasi) {
            if (!informasi) {
                return {
                    type: 'umum',
                    label: 'Umum',
                    icon: 'fa-globe',
                    badgeClass: 'badge-umum',
                    infoClass: 'umum',
                    labelClass: 'umum-text',
                    message: 'Program ini dapat diakses oleh semua kalangan.'
                };
            }

            const info = informasi.toString().toLowerCase().trim();

            if (info === 'publik') {
                return {
                    type: 'publik',
                    label: 'Publik',
                    icon: 'fa-share-alt',
                    badgeClass: 'badge-publik',
                    infoClass: 'publik',
                    labelClass: 'publik-text',
                    message: '📢 Program ini untuk publik. Silahkan disebarkan ke masyarakat luas.'
                };
            } else if (info === 'petugas') {
                return {
                    type: 'petugas',
                    label: 'Internal Petugas',
                    icon: 'fa-user-shield',
                    badgeClass: 'badge-petugas',
                    infoClass: 'petugas',
                    labelClass: 'petugas-text',
                    message: '🔒 Khusus Petugas LPS. Berisi data dan informasi internal.'
                };
            }

            return {
                type: 'umum',
                label: 'Umum',
                icon: 'fa-globe',
                badgeClass: 'badge-umum',
                infoClass: 'umum',
                labelClass: 'umum-text',
                message: 'Program ini dapat diakses oleh semua kalangan.'
            };
        }

        function getInfoMessage(informasi) {
            const info = getCategoryInfo(informasi);
            return info.message;
        }

        // ============================================================
        // FETCH DATA DARI APPS SCRIPT
        // ============================================================
        async function fetchPrograms() {
            try {
                const response = await fetch(WEB_APP_URL + '?t=' + Date.now(), {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();

                if (result.status === 'success' && result.data && result.data.length > 0) {
                    // Filter: hanya tampilkan yang memiliki URL_LINK valid
                    const validPrograms = result.data.filter(prog => {
                        const hasValidUrl = prog.link &&
                            prog.link.trim() !== '' &&
                            prog.link !== '#' &&
                            prog.link !== 'null' &&
                            prog.link !== 'undefined';

                        if (!hasValidUrl) {
                            console.log(`⚠️ Program "${prog.name}" tidak ditampilkan (URL_LINK kosong)`);
                        }
                        return hasValidUrl;
                    });

                    console.log(`✅ Total program dari server: ${result.data.length}`);
                    console.log(`✅ Program valid (dengan link): ${validPrograms.length}`);

                    if (validPrograms.length === 0) {
                        throw new Error('Tidak ada program dengan URL_LINK yang valid');
                    }

                    // Tambahkan data kategori
                    validPrograms.forEach(prog => {
                        prog.category = getCategoryInfo(prog.informasi);
                        prog.infoMessage = getInfoMessage(prog.informasi);
                    });

                    return validPrograms;
                } else {
                    throw new Error(result.message || 'Data kosong dari server');
                }
            } catch (error) {
                console.error('❌ Error fetching data:', error);
                throw new Error(`Gagal terhubung ke server: ${error.message}`);
            }
        }

        // ============================================================
        // RENDER PROGRAM CARDS
        // ============================================================
        function renderPrograms(programs) {
            const grid = document.getElementById('programGrid');

            if (!programs || programs.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox" style="font-size: 3.5rem; color: rgba(255,255,255,0.2);"></i>
                        <h3>Belum Ada Program</h3>
                        <p>Saat ini belum ada program yang tersedia. Silakan cek kembali nanti.</p>
                        <button class="btn-retry" onclick="init()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                `;
                return;
            }

            let cardsHtml = '';
            programs.forEach((prog, index) => {
                const safeName = prog.name.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });

                const cat = prog.category;

                cardsHtml += `
                    <div class="program-card" data-index="${index}">
                        <div class="icon-wrapper">
                            <img src="${prog.iconUrl}" 
                                 alt="${safeName}" 
                                 loading="lazy"
                                 onerror="this.src='https://placehold.co/200x200/1a2a40/57c5b6?text=${encodeURIComponent(prog.name.charAt(0))}'">
                        </div>
                        <div class="program-name">${safeName}</div>
                        <span class="badge-category ${cat.badgeClass}">
                            <i class="fas ${cat.icon}"></i> ${cat.label}
                        </span>
                        <div class="divider-premium"></div>
                        <div class="click-hint">
                            <i class="fas fa-hand-pointer"></i> Ketuk untuk opsi
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = cardsHtml;

            // Event listener untuk setiap card
            document.querySelectorAll('.program-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const idx = this.getAttribute('data-index');
                    if (idx !== null && programs[idx]) {
                        openModal(programs[idx]);
                    }
                });
            });
        }

        // ============================================================
        // MODAL FUNCTIONS
        // ============================================================
        function openModal(program) {
            currentProgram = program;

            // Isi data
            document.getElementById('modalIcon').src = program.iconUrl;
            document.getElementById('modalIcon').onerror = function() {
                this.src = 'https://placehold.co/200x200/1a2a40/57c5b6?text=' + encodeURIComponent(program.name.charAt(0));
            };

            document.getElementById('modalTitle').textContent = program.name;

            // Info
            const infoContainer = document.getElementById('modalInfo');
            const cat = program.category;

            infoContainer.className = `modal-info ${cat.infoClass}`;
            infoContainer.innerHTML = `
                <div class="info-label ${cat.labelClass}">
                    <i class="fas ${cat.icon}"></i>
                    <span>${cat.label}</span>
                </div>
                <div class="info-desc">${program.infoMessage}</div>
                ${program.deskripsi ? `<div class="info-desc" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);">${program.deskripsi}</div>` : ''}
            `;

            // Tampilkan modal
            document.getElementById('programModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('programModal').classList.remove('active');
            document.body.style.overflow = '';
            currentProgram = null;
        }

        // ============================================================
        // MODAL ACTIONS
        // ============================================================
        function shareToWhatsApp() {
            if (!currentProgram) return;

            let message = `Halo! Saya ingin berbagi program unggulan dari LPS Padang Terubuk Asri:%0A%0A`;
            message += `📌 *${currentProgram.name}*%0A`;
            message += `📝 ${currentProgram.infoMessage}%0A%0A`;
            message += `🔗 Link: ${currentProgram.link}`;

            // Tambahan catatan khusus
            if (currentProgram.category.type === 'petugas') {
                message += `%0A%0A🔒 *Catatan:* Khusus Petugas LPS. Tidak untuk publik.`;
            } else if (currentProgram.category.type === 'publik') {
                message += `%0A%0A📢 *Catatan:* Silahkan disebarkan ke masyarakat.`;
            }

            window.open(`https://wa.me/?text=${message}`, '_blank');
            closeModal();
        }

        function openInBrowser() {
            if (!currentProgram) return;

            let url = currentProgram.link;
            if (!url || url === '#' || url === 'null' || url === 'undefined') {
                alert('Maaf, tautan program tidak tersedia.');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            window.open(url, '_blank');
            closeModal();
        }

        // ============================================================
        // EVENT LISTENERS MODAL
        // ============================================================
        document.getElementById('modalShareBtn').addEventListener('click', shareToWhatsApp);
        document.getElementById('modalOpenBtn').addEventListener('click', openInBrowser);
        document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

        // Tutup modal saat klik overlay
        document.getElementById('programModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Tutup modal dengan tombol ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            const grid = document.getElementById('programGrid');

            // Tampilkan loading
            grid.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p style="color: rgba(255,255,255,0.5);">Memuat program...</p>
                </div>
            `;

            try {
                programsData = await fetchPrograms();
                renderPrograms(programsData);
            } catch (error) {
                grid.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f59e0b;"></i>
                        <h3>Gagal Memuat Program</h3>
                        <p>${error.message}</p>
                        <p style="font-size:0.85rem; opacity:0.6; margin-top:0.5rem;">
                            Pastikan Web App URL sudah benar dan sudah di-deploy.
                        </p>
                        <button class="btn-retry" onclick="init()">
                            <i class="fas fa-sync-alt"></i> Coba Lagi
                        </button>
                    </div>
                `;
            }
        }

        // Jalankan
        document.addEventListener('DOMContentLoaded', init);

        // ============================================================
        // LOG UNTUK DEBUG
        // ============================================================
        console.log('🚀 Program LPS Padang Terubuk Asri');
        console.log('📡 Web App URL:', WEB_APP_URL);
        console.log('📋 Spreadsheet ID: 1_33xra7TAVf04gkf2k7aR1dPB4fr29bHvlPPNkmEUuk');
        console.log('📊 Sheet: DAFTAR_APLIKASI');
        console.log('📌 Header: NAMA_APLIKASI | LINK_FOTO | URL_LINK | INFORMASI');
    </script>
